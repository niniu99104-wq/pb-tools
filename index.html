<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peanuts.bebe 上架小幫手系統</title>
    <style>
        :root {
            --primary-color: #C1A58D; 
            --bg-color: #F9F7F3;
            --text-color: #4A4A4A;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: var(--primary-color); margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--primary-color); }
        button {
            width: 100%; padding: 14px; background-color: var(--primary-color);
            color: white; border: none; border-radius: 8px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* 區隔線 */
        hr { border: 0; height: 1px; background: #eee; margin: 20px 0; }

        #report-section {
            display: none;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #eee;
        }
        .price-display {
            font-size: 32px; color: #d9534f; font-weight: bold; margin: 10px 0;
        }
        .btn-submit { background-color: #8D99AE; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🧸 換算與上架回報</h2>
    
    <!-- 身分輸入區 -->
    <div class="form-group">
        <label>👤 小幫手名稱 / 編號</label>
        <input type="text" id="helperName" placeholder="請輸入你的代號">
    </div>
    
    <hr>

    <!-- 換算區塊 -->
    <div class="form-group">
        <label>1. 輸入韓幣價格 (₩)</label>
        <input type="number" id="krwPrice" placeholder="例如：15000">
    </div>
    <button onclick="calculatePrice()">計算台幣售價</button>

    <!-- 換算結果與回報區塊 -->
    <div id="report-section">
        <label>台幣上架定價：</label>
        <div class="price-display" id="finalPrice">$0</div>
        
        <div class="form-group" style="margin-top: 20px;">
            <label>2. 商品名稱 / 貨號</label>
            <input type="text" id="productName" placeholder="例如：秋季碎花洋裝 A01">
        </div>
        <div class="form-group">
            <label>3. 官網上架網址</label>
            <input type="text" id="productLink" placeholder="貼上完成上架的網址">
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitRecord()">✅ 已上架，送出紀錄</button>
    </div>
</div>

<script>
    // ！！！請把下面單引號裡面的文字，換成你 Google Apps Script 部署出來的 Web App URL ！！！
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7URKoxNzd7p7Qgs3txTVzMjNWszfMMIDa2E4CuxBF3Y9jdAUminTY0xAJJzNmG-JA/exec';

    let currentKrw = 0;
    let currentTwd = 0;

    function calculatePrice() {
        const helperName = document.getElementById('helperName').value;
        const krwInput = document.getElementById('krwPrice').value;

        if (!helperName) {
            alert('請先輸入小幫手名稱或編號！');
            return;
        }
        if (!krwInput) {
            alert('請輸入韓幣價格！');
            return;
        }

        currentKrw = parseFloat(krwInput);
        // 公式：韓幣 * 1.03 / 41 * 1.6
        currentTwd = Math.round((currentKrw * 1.03 / 41) * 1.6);

        document.getElementById('finalPrice').innerText = 'NT$ ' + currentTwd;
        document.getElementById('report-section').style.display = 'block';
    }

    function submitRecord() {
        const helperName = document.getElementById('helperName').value;
        const productName = document.getElementById('productName').value;
        const productLink = document.getElementById('productLink').value;

        if (!productName || !productLink) {
            alert('商品名稱與網址都要填寫喔！');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = '⏳ 紀錄傳送中...';
        submitBtn.disabled = true;

        const formData = new URLSearchParams({
            helperName: helperName,
            krwPrice: currentKrw,
            finalPrice: currentTwd,
            productName: productName,
            productLink: productLink
        });

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            alert('✅ 紀錄已成功送出！');
            // 清空商品資訊，但保留小幫手名稱，方便連續作業
            document.getElementById('krwPrice').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productLink').value = '';
            document.getElementById('report-section').style.display = 'none';
            
            submitBtn.innerText = '✅ 已上架，送出紀錄';
            submitBtn.disabled = false;
        })
        .catch(error => {
            alert('❌ 發生錯誤，請檢查網址設定或網路狀態。');
            submitBtn.innerText = '✅ 已上架，送出紀錄';
            submitBtn.disabled = false;
        });
    }
</script>

</body>
</html>
